<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

.root{
  width:100%;
  position:relative;
  background:#fff;
  overflow:hidden;
  min-height:768px;
}

/* all pages occupy same space */
.section{
  position:absolute;
  inset:0;

  opacity:0;
  visibility:hidden;

  transform:translateY(20px);
  filter:blur(8px);

  transition:
    opacity .65s cubic-bezier(.22,1,.36,1),
    transform .65s cubic-bezier(.22,1,.36,1),
    filter .65s cubic-bezier(.22,1,.36,1),
    visibility 0s linear .65s;

  pointer-events:none;
}

.section.active{
  opacity:1;
  visibility:visible;

  transform:translateY(0);
  filter:blur(0);

  transition:
    opacity .65s cubic-bezier(.22,1,.36,1),
    transform .65s cubic-bezier(.22,1,.36,1),
    filter .65s cubic-bezier(.22,1,.36,1);

  pointer-events:auto;
  z-index:2;
}

<script>
let currentPage = 'assets';

function go(name){

  if(name === currentPage) return;

  const current = document.getElementById('sec-' + currentPage);
  const next = document.getElementById('sec-' + name);

  current.classList.remove('active');

  requestAnimationFrame(() => {
    next.classList.add('active');
  });

  currentPage = name;
}
</script>
